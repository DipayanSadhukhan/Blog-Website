            <form class="form-inline my-2 my-lg-0">

                    margin: 0 3px;

            <div id="bottom" class ="row justify-content-center">

                        <form>
                            <h1 class="h4 mb-3 text-center">Enter Credentials</h1>
                            <div class="form-floating mb-3">
                                <label for="floatingInput">Email address</label>
                                <input type="email" class="form-control" id="floatingInput"
                                    placeholder="@gmail.com">
                            </div>
                            <div class="form-floating mb-3">
                                <label for="floatingPassword">Password</label>
                                <input type="password" class="form-control" id="floatingPassword"
                                    placeholder="Password">
                            </div>
                            <div class="form-check text-start my-3">
                                <input class="form-check-input" type="checkbox" value="remember-me"
                                    id="flexCheckDefault">
                                <label class="form-check-label" for="flexCheckDefault"> All Checked
                                </label>
                            </div>
                            <button class="btn btn-success w-100 py-2 my-3" type="submit">Log In</button>
                        </form>
                    </main>
                </div>
            </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
